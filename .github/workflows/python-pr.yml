# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: pr

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@v3
      with:
        python-version: "3.13"

    - name: Get changed Python files
      id: changed-files
      uses: tj-actions/changed-files@v46
      with:
        files: |
          **/*.py

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install flit
        flit install

    - name: Ruff lint
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        ruff check ${{ steps.changed-files.outputs.all_changed_files }}

    - name: Ruff format check
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        ruff format --check ${{ steps.changed-files.outputs.all_changed_files }}

    - name: Ruff isort check
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        ruff check --select I ${{ steps.changed-files.outputs.all_changed_files }}

    - name: Unittest
      run: |
        pytest tests --cov=codefab --cov-branch --cov-report=xml

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Check commit messages
      run: |
        cz check \
          --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
